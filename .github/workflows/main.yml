name: 🚀 Xray VPN Server (2h)

on:
  # Run manually from the Actions tab
  workflow_dispatch:

  # Optional: run on a schedule (uncomment and adjust cron as needed)
  # schedule:
  #   - cron: '0 */2 * * *'   # every 2 hours

jobs:
  vpn-server:
    name: Start VPN Server
    runs-on: ubuntu-latest
    timeout-minutes: 125      # 5-min buffer over the 2-hour sleep

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. System dependencies ───────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl unzip

      # ── 4. Run setup & keep-alive ─────────────────────────────────
      - name: 🛡️ Start Xray VPN (2 hours)
        run: sudo -E python3 xray_setup.py
        # -E preserves TELEGRAM_* env vars when running as root
